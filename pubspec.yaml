name: gig_tasks
description: A task management app for gig workers built with Clean Architecture, BLoC, and Firebase.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.15.2
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4

  # State management
  flutter_bloc: ^8.1.6
  bloc: ^8.1.4
  equatable: ^2.0.5

  # Dependency injection
  get_it: ^8.0.2
  injectable: ^2.4.4

  # Navigation
  go_router: ^14.3.0

  # Utilities
  intl: ^0.19.0
  uuid: ^4.5.1
  dartz: ^0.10.1
  rxdart: ^0.28.0

  # UI
  shimmer: ^3.0.0
  flutter_animate: ^4.5.0
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

  # Code generation
  injectable_generator: ^2.6.2
  build_runner: ^2.4.12

  # Testing
  bloc_test: ^9.1.7
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/